name: Lesson14 CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_EVIDENCE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  syntax-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Shell syntax
        run: |
          bash -n tools/lib/lesson_display_labels.sh
          bash -n tools/lib/lesson_runtime.sh
          bash -n tools/lib/lesson_context.sh
          bash -n tools/lib/document_paths.sh
          bash -n tools/lib/git_workflow_policy.sh
          bash -n tools/lib/git_hooks_policy.sh
          bash -n tools/lib/resource_guard.sh
          bash -n tools/lib/ci_evidence.sh
          bash -n tools/lib/ci_timing.sh
          bash -n tools/lib/as_built_evidence.sh
          bash -n tools/lib/test_plan.sh
          bash -n tools/lib/repository_development_workflow.sh
          bash -n tools/lib/development_instruction.sh
          bash -n tools/lib/fixture_copy.sh
          bash -n tools/lib/security_invariants.sh
          bash -n tools/lib/product_security.sh
          bash -n tools/product-security
          bash -n tools/lib/dashboard_data.sh
          bash -n tools/lesson14
          bash -n tools/roadmap
          bash -n tools/helpdesk
          bash -n tools/check_lesson14_structure.sh
          bash -n tools/check_lesson14_sync.sh
          bash -n tools/check_document_organization.sh
          bash -n tools/check_learner_display.sh
          bash -n tools/check_git_sync.sh
          bash -n tools/check_ci_status.sh
          bash -n tools/check_agents_skills.sh
          bash -n tools/check_as_built_docs.sh
          bash -n tools/check_as_built_sync_contract.sh
          bash -n tools/check_test_plan_coverage.sh
          bash -n tools/check_security_invariants.sh
          bash -n tools/check_workflow_pair_sync.sh
          bash -n tools/check_review_protocol.sh
          bash -n tools/check_developer_memory_requirements.sh
          bash -n tools/check_repository_development_workflow.sh
          bash -n tools/check_development_instruction.sh
          bash -n tools/check_dashboard_design_system.sh
          bash -n tools/check_dashboard_bundle_contract.sh
          bash -n tools/check_ci_workflow_structure.sh
          bash -n tools/test_lesson_playwright.sh
          bash -n tools/test_docs_tour.sh
          bash -n tools/test_as_built_sync_contract.sh
          bash -n tools/test_as_built_single_pass.sh
          bash -n tools/test_test_plan.sh
          bash -n tools/test_repository_development_workflow.sh
          bash -n tools/test_development_instruction.sh
          bash -n tools/test_security_invariants.sh
          bash -n tools/test_git_workflow_policy.sh
          bash -n tools/test_git_hooks.sh
          bash -n tools/test_resource_guard.sh
          bash -n tools/test_resource_guard_summary.sh
          bash -n tools/test_resource_cleanup.sh
          bash -n tools/test_git_hooks_parallel.sh
          bash -n tools/test_fixture_copy.sh
          bash -n tools/test_ci_evidence.sh
          bash -n tools/test_verification_foundation.sh
          bash -n tools/test_verification_runner.sh
          bash -n tools/test_verification_git_hooks.sh
          bash -n tools/test_dashboard_same_run_verification.sh
          bash -n tools/test_ci_timing.sh
          bash -n tools/test_dashboard_schema.sh
          bash -n tools/test_dashboard_data.sh
          bash -n tools/test_dashboard_data_product_repository_selection.sh
          bash -n tools/test_dashboard_settings.sh
          bash -n tools/test_dashboard_i18n.sh
          bash -n tools/test_dashboard_browser_debug_manifest.sh
          bash -n tools/test_dashboard_design_studio_events.sh
          bash -n tools/test_dashboard_control_center.sh
          bash -n tools/product-launch-check
          bash -n tools/test_product_launch_check.sh
          bash -n tools/product-scaffold-check
          bash -n tools/test_product_scaffold_check.sh
          bash -n tools/test_ci_final_gate.sh
          bash -n tools/test_ci_pipeline_acceleration.sh
          bash -n tools/test_lesson_start_position.sh
          bash -n tools/test_lesson.sh
          bash -n tools/test_lesson_context.sh
          bash -n tools/test_menu_prerequisites.sh
          bash -n tools/test_product_gate_tools.sh
          bash -n tools/lib/product_repository_authority.sh
          bash -n tools/lib/product_workflow_git_usage.sh
          bash -n tools/product-repository-authority
          bash -n tools/product-repository-mode
          bash -n tools/product-repository-cleanup
          bash -n tools/fixture-copy
          bash -n tools/test_product_repository_cleanup.sh
          bash -n tools/test_product_repository_authority.sh
          bash -n tools/test_product_repository_mode.sh
          bash -n tools/product-security
          bash -n tools/test_product_security.sh
          bash -n tools/test_product_git_usage_modes.sh
          bash -n tools/test_lesson_repository.sh
          bash -n tools/ci-evidence
          bash -n tools/ci-timing
          bash -n tools/ci-final-gate
          bash -n tools/ci-playwright-setup
          bash -n tools/test_lesson14.sh
          bash -n tools/menu
          bash -n tools/as-built-sync
          bash -n tools/test-plan
          bash -n tools/repository-development-workflow
          node --check tools/development-instruction
          node --check tools/lib/development_instruction.mjs
          node --check tools/test_development_instruction.mjs
          bash -n tools/git-workflow
          bash -n tools/git-hooks
          bash -n tools/resource-guard
          bash -n tools/docs-tour
          bash -n tools/dashboard-data
          bash -n tools/dashboard-settings
          bash -n tools/dashboard-control-center
          bash -n tools/free-development
          bash -n tools/team-development
          bash -n tools/external-integration
          bash -n tools/product-improvement
          bash -n tools/lesson-context
          node --check tools/lib/verification_core.mjs
          node --check tools/verification
          node --check tools/test_verification_foundation.mjs
          node --check tools/lib/as_built_index.mjs
          node --check tools/check_as_built_sync_contract.mjs
          node --check tools/test_as_built_single_pass.mjs
          node --check tools/lib/verification_runner.mjs
          node --check tools/lib/verification_git_hooks.mjs
          node --check tools/verification-runner
          node --check tools/test_verification_runner.mjs
          node --check tools/lib/dashboard_verification.mjs
          node --check tools/check_dashboard_bundle_contract.mjs
          node --check tools/dashboard-verification
          node --check tools/test_dashboard_same_run_verification.mjs
          node --check tools/lib/ci_composition.mjs
          node --check tools/verification-ci
          node --check tools/test_ci_composition.mjs

  lesson14-structure-sync:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Composed Lesson14 structure owners
        run: ./tools/verification-ci run-job --workflow lesson14 --job lesson14-structure-sync --jobs 2

  policy-regression-tests:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
      - lesson14-structure-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Policy compatibility proof
        env:
          CI_COMPOSED_RESULTS_JSON: '{"syntax-checks":"${{ needs.syntax-checks.result }}","lesson14-structure-sync":"${{ needs.lesson14-structure-sync.result }}"}'
        run: ./tools/verification-ci proof --workflow lesson14 --job policy-regression-tests

  lesson14-cli-tests:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Composed Lesson14 CLI owner
        run: ./tools/verification-ci run-job --workflow lesson14 --job lesson14-cli-tests --jobs 1

  playwright-tests:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
      - lesson14-structure-sync
      - policy-regression-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Shared Playwright coverage compatibility proof
        env:
          CI_COMPOSED_RESULTS_JSON: '{"syntax-checks":"${{ needs.syntax-checks.result }}","lesson14-structure-sync":"${{ needs.lesson14-structure-sync.result }}","policy-regression-tests":"${{ needs.policy-regression-tests.result }}"}'
        run: ./tools/verification-ci proof --workflow lesson14 --job playwright-tests

  lesson14-final-gate:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
      - lesson14-structure-sync
      - policy-regression-tests
      - lesson14-cli-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Lesson14 final compatibility proof
        env:
          CI_COMPOSED_RESULTS_JSON: '{"syntax-checks":"${{ needs.syntax-checks.result }}","lesson14-structure-sync":"${{ needs.lesson14-structure-sync.result }}","policy-regression-tests":"${{ needs.policy-regression-tests.result }}","lesson14-cli-tests":"${{ needs.lesson14-cli-tests.result }}"}'
        run: ./tools/verification-ci proof --workflow lesson14 --job lesson14-final-gate

  aggregate-and-full-hooks:
    runs-on: ubuntu-latest
    env:
      CI_COMMON_COVERAGE_SOURCE: ci-split-common-coverage
    needs:
      - syntax-checks
      - lesson14-structure-sync
      - policy-regression-tests
      - lesson14-cli-tests
      - playwright-tests
      - lesson14-final-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Compatibility aggregate and full-hooks proof
        env:
          CI_COMPOSED_RESULTS_JSON: '{"syntax-checks":"${{ needs.syntax-checks.result }}","lesson14-structure-sync":"${{ needs.lesson14-structure-sync.result }}","policy-regression-tests":"${{ needs.policy-regression-tests.result }}","lesson14-cli-tests":"${{ needs.lesson14-cli-tests.result }}","playwright-tests":"${{ needs.playwright-tests.result }}","lesson14-final-gate":"${{ needs.lesson14-final-gate.result }}"}'
        run: ./tools/verification-ci proof --workflow lesson14 --job aggregate-and-full-hooks
