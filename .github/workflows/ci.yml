name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_EVIDENCE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  syntax-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Shell syntax
        run: |
          bash -n .githooks/pre-commit
          bash -n tools/lib/lesson_display_labels.sh
          bash -n tools/lib/lesson_common.sh
          bash -n tools/lib/lesson_runtime.sh
          bash -n tools/lib/lesson_context.sh
          bash -n tools/lib/document_paths.sh
          bash -n tools/lib/git_workflow_policy.sh
          bash -n tools/lib/git_hooks_policy.sh
          bash -n tools/lib/resource_guard.sh
          bash -n tools/lib/ci_evidence.sh
          bash -n tools/lib/ci_timing.sh
          bash -n tools/lib/as_built_evidence.sh
          bash -n tools/lib/test_plan.sh
          bash -n tools/lib/repository_development_workflow.sh
          bash -n tools/lib/development_instruction.sh
          bash -n tools/lib/fixture_copy.sh
          bash -n tools/lib/security_invariants.sh
          bash -n tools/lib/product_security.sh
          bash -n tools/lib/dashboard_data.sh
          bash -n tools/check_lesson_structure.sh
          bash -n tools/check_document_organization.sh
          bash -n tools/check_learner_display.sh
          bash -n tools/check_repository_boundary.sh
          bash -n tools/check_agents_skills.sh
          bash -n tools/check_as_built_docs.sh
          bash -n tools/check_as_built_sync_contract.sh
          bash -n tools/check_test_plan_coverage.sh
          bash -n tools/check_security_invariants.sh
          bash -n tools/check_workflow_pair_sync.sh
          bash -n tools/check_review_protocol.sh
          bash -n tools/check_developer_memory_requirements.sh
          bash -n tools/check_repository_development_workflow.sh
          bash -n tools/check_development_instruction.sh
          bash -n tools/check_dashboard_design_system.sh
          bash -n tools/check_dashboard_bundle_contract.sh
          bash -n tools/check_ci_workflow_structure.sh
          bash -n tools/test_lesson_playwright.sh
          bash -n tools/test_docs_tour.sh
          bash -n tools/test_as_built_sync_contract.sh
          bash -n tools/test_as_built_single_pass.sh
          bash -n tools/test_test_plan.sh
          bash -n tools/test_repository_development_workflow.sh
          bash -n tools/test_development_instruction.sh
          bash -n tools/test_security_invariants.sh
          bash -n tools/test_git_workflow_policy.sh
          bash -n tools/test_git_hooks.sh
          bash -n tools/test_resource_guard.sh
          bash -n tools/test_resource_guard_summary.sh
          bash -n tools/test_resource_cleanup.sh
          bash -n tools/test_git_hooks_parallel.sh
          bash -n tools/test_fixture_copy.sh
          bash -n tools/test_ci_evidence.sh
          bash -n tools/test_verification_foundation.sh
          bash -n tools/test_verification_runner.sh
          bash -n tools/test_verification_git_hooks.sh
          bash -n tools/test_dashboard_same_run_verification.sh
          bash -n tools/test_ci_timing.sh
          bash -n tools/test_dashboard_schema.sh
          bash -n tools/test_dashboard_data.sh
          bash -n tools/test_dashboard_data_product_repository_selection.sh
          bash -n tools/test_dashboard_settings.sh
          bash -n tools/test_dashboard_i18n.sh
          bash -n tools/test_dashboard_browser_debug_manifest.sh
          bash -n tools/test_dashboard_design_studio_events.sh
          bash -n tools/test_dashboard_control_center.sh
          bash -n tools/product-launch-check
          bash -n tools/test_product_launch_check.sh
          bash -n tools/product-scaffold-check
          bash -n tools/test_product_scaffold_check.sh
          bash -n tools/test_ci_final_gate.sh
          bash -n tools/test_ci_pipeline_acceleration.sh
          bash -n tools/test_lesson_start_position.sh
          bash -n tools/test_lesson.sh
          bash -n tools/test_lesson_context.sh
          bash -n tools/test_lesson14.sh
          bash -n tools/test_menu_prerequisites.sh
          bash -n tools/test_product_gate_tools.sh
          bash -n tools/lib/product_repository_authority.sh
          bash -n tools/lib/product_workflow_git_usage.sh
          bash -n tools/product-repository-authority
          bash -n tools/product-repository-mode
          bash -n tools/product-repository-cleanup
          bash -n tools/test_product_repository_cleanup.sh
          bash -n tools/test_product_repository_authority.sh
          bash -n tools/test_product_repository_mode.sh
          bash -n tools/fixture-copy
          bash -n tools/product-security
          bash -n tools/test_product_security.sh
          bash -n tools/test_product_git_usage_modes.sh
          bash -n tools/test_lesson_repository.sh
          bash -n tools/ci-evidence
          bash -n tools/ci-timing
          bash -n tools/ci-final-gate
          bash -n tools/ci-playwright-setup
          bash -n tools/menu
          bash -n tools/as-built-sync
          bash -n tools/test-plan
          bash -n tools/repository-development-workflow
          node --check tools/development-instruction
          node --check tools/lib/development_instruction.mjs
          node --check tools/test_development_instruction.mjs
          bash -n tools/git-workflow
          bash -n tools/git-hooks
          bash -n tools/resource-guard
          bash -n tools/docs-tour
          bash -n tools/dashboard-data
          bash -n tools/dashboard-settings
          bash -n tools/dashboard-control-center
          bash -n tools/free-development
          bash -n tools/team-development
          bash -n tools/external-integration
          bash -n tools/product-improvement
          bash -n tools/lesson
          bash -n tools/lesson-context
          bash -n tools/learn
          node --check tools/lib/repository_document_sync.mjs
          node --check tools/check_repository_document_sync.mjs
          node --check tools/test_repository_document_sync.mjs
          node --check tools/lib/verification_core.mjs
          node --check tools/verification
          node --check tools/test_verification_foundation.mjs
          node --check tools/lib/as_built_index.mjs
          node --check tools/check_as_built_sync_contract.mjs
          node --check tools/test_as_built_single_pass.mjs
          node --check tools/lib/verification_runner.mjs
          node --check tools/lib/verification_git_hooks.mjs
          node --check tools/verification-runner
          node --check tools/test_verification_runner.mjs
          node --check tools/lib/dashboard_verification.mjs
          node --check tools/check_dashboard_bundle_contract.mjs
          node --check tools/dashboard-verification
          node --check tools/test_dashboard_same_run_verification.mjs
          node --check tools/lib/ci_composition.mjs
          node --check tools/verification-ci
          node --check tools/test_ci_composition.mjs

  repository-document-sync:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout full parent history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate parent document-sync policy and rejection tests
        run: ./tools/verification-ci run-job --workflow main --job repository-document-sync --jobs 2

      - name: Check pull request document synchronization
        if: github.event_name == 'pull_request'
        run: node tools/check_repository_document_sync.mjs --range-mode pr --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - name: Check push document synchronization
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: node tools/check_repository_document_sync.mjs --range-mode push --base "${{ github.event.before }}" --head "${{ github.sha }}"

      - name: Check initial push document synchronization
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: node tools/check_repository_document_sync.mjs --initial-head "${{ github.sha }}"

  structure-docs-checks:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Composed structure and document owners
        run: ./tools/verification-ci run-job --workflow main --job structure-docs-checks --jobs 4

  policy-regression-tests:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Composed policy regression owners
        run: ./tools/verification-ci run-job --workflow main --job policy-regression-tests --jobs 4

  lesson-cli-tests:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Composed lesson CLI owners
        run: ./tools/verification-ci run-job --workflow main --job lesson-cli-tests --jobs 3

  playwright-tests:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install browser test dependencies
        run: ./tools/ci-playwright-setup

      - name: Composed browser owners
        env:
          CI_EVIDENCE_DIR: ${{ runner.temp }}/ci-evidence
          CI_EVIDENCE_SOURCE_JOB: playwright-tests
          CI_EVIDENCE_WRITE: "1"
        run: ./tools/verification-ci run-job --workflow main --job playwright-tests --jobs 1

  lesson-aggregate:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
      - repository-document-sync
      - structure-docs-checks
      - policy-regression-tests
      - lesson-cli-tests
      - playwright-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Composed owner result proof
        env:
          CI_COMPOSED_RESULTS_JSON: '{"syntax-checks":"${{ needs.syntax-checks.result }}","repository-document-sync":"${{ needs.repository-document-sync.result }}","structure-docs-checks":"${{ needs.structure-docs-checks.result }}","policy-regression-tests":"${{ needs.policy-regression-tests.result }}","lesson-cli-tests":"${{ needs.lesson-cli-tests.result }}","playwright-tests":"${{ needs.playwright-tests.result }}"}'
          CI_TIMING_DIR: ${{ runner.temp }}/ci-timing
          CI_TIMING_REPORT: ${{ runner.temp }}/ci-timing/lesson-aggregate.tsv
        run: ./tools/ci-timing run lesson_aggregate --display-name "Composed owner result proof" --command-id "verification-ci proof" --mode proof-only --evidence recorded --inputs docs/workflow/FINAL_GATE_CI_GRAPH.tsv docs/workflow/FINAL_GATE_EXECUTION_POLICY.tsv docs/workflow/GIT_HOOK_CHECKS.tsv docs/workflow/GIT_HOOK_PARALLEL_GROUPS.tsv .github/workflows -- ./tools/verification-ci proof --workflow main --job lesson-aggregate --output "${{ runner.temp }}/ci-composed-proof/proof.json"

      - name: Upload composed proof
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-composed-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-composed-proof/proof.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload lesson aggregate timing
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-timing-part-lesson-aggregate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  git-hooks-full-no-cache:
    runs-on: ubuntu-latest
    needs:
      - lesson-aggregate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Full no-cache compatibility proof
        env:
          CI_COMPOSED_RESULTS_JSON: '{"lesson-aggregate":"${{ needs.lesson-aggregate.result }}"}'
          CI_TIMING_DIR: ${{ runner.temp }}/ci-timing
          CI_TIMING_REPORT: ${{ runner.temp }}/ci-timing/git-hooks-full-no-cache.tsv
        run: ./tools/ci-timing run git_hooks_full_no_cache --display-name "Full no-cache compatibility proof" --command-id "verification-ci proof" --mode proof-only --evidence used --inputs docs/workflow/FINAL_GATE_CI_GRAPH.tsv docs/workflow/FINAL_GATE_EXECUTION_POLICY.tsv .github/workflows -- ./tools/verification-ci proof --workflow main --job git-hooks-full-no-cache

      - name: Upload Git hooks timing
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-timing-part-git-hooks-full-no-cache-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  final-gate:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - lesson-aggregate
      - git-hooks-full-no-cache
      - repository-document-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify split prerequisites
        env:
          LESSON_AGGREGATE_RESULT: ${{ needs.lesson-aggregate.result }}
          GIT_HOOKS_FULL_NO_CACHE_RESULT: ${{ needs.git-hooks-full-no-cache.result }}
          REPOSITORY_DOCUMENT_SYNC_RESULT: ${{ needs.repository-document-sync.result }}
        run: |
          if [[ "$LESSON_AGGREGATE_RESULT" != "success" || "$GIT_HOOKS_FULL_NO_CACHE_RESULT" != "success" || "$REPOSITORY_DOCUMENT_SYNC_RESULT" != "success" ]]; then
            printf 'Split prerequisite failed: lesson-aggregate=%s git-hooks-full-no-cache=%s repository-document-sync=%s\n' "$LESSON_AGGREGATE_RESULT" "$GIT_HOOKS_FULL_NO_CACHE_RESULT" "$REPOSITORY_DOCUMENT_SYNC_RESULT" >&2
            exit 1
          fi

      - name: Download composed proof
        uses: actions/download-artifact@v8.0.1
        with:
          name: ci-composed-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-composed-proof

      - name: Final composed evidence gate
        env:
          CI_COMPOSED_PROOF_FILE: ${{ runner.temp }}/ci-composed-proof/proof.json
        run: ./tools/ci-final-gate

      - name: Download CI timing parts
        if: always()
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ci-timing-part-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          merge-multiple: true

      - name: Upload CI timing report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-timing-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7
