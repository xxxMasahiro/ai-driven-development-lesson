name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_EVIDENCE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  syntax-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shell syntax
        run: |
          bash -n .githooks/pre-commit
          bash -n tools/lib/lesson_display_labels.sh
          bash -n tools/lib/lesson_common.sh
          bash -n tools/lib/lesson_runtime.sh
          bash -n tools/lib/lesson_context.sh
          bash -n tools/lib/document_paths.sh
          bash -n tools/lib/git_workflow_policy.sh
          bash -n tools/lib/git_hooks_policy.sh
          bash -n tools/lib/resource_guard.sh
          bash -n tools/lib/ci_evidence.sh
          bash -n tools/lib/ci_timing.sh
          bash -n tools/lib/as_built_evidence.sh
          bash -n tools/lib/test_plan.sh
          bash -n tools/lib/repository_development_workflow.sh
          bash -n tools/lib/fixture_copy.sh
          bash -n tools/lib/security_invariants.sh
          bash -n tools/lib/product_security.sh
          bash -n tools/lib/dashboard_data.sh
          bash -n tools/check_lesson_structure.sh
          bash -n tools/check_document_organization.sh
          bash -n tools/check_learner_display.sh
          bash -n tools/check_repository_boundary.sh
          bash -n tools/check_agents_skills.sh
          bash -n tools/check_as_built_docs.sh
          bash -n tools/check_as_built_sync_contract.sh
          bash -n tools/check_test_plan_coverage.sh
          bash -n tools/check_security_invariants.sh
          bash -n tools/check_workflow_pair_sync.sh
          bash -n tools/check_review_protocol.sh
          bash -n tools/check_developer_memory_requirements.sh
          bash -n tools/check_repository_development_workflow.sh
          bash -n tools/check_dashboard_design_system.sh
          bash -n tools/check_ci_workflow_structure.sh
          bash -n tools/test_lesson_playwright.sh
          bash -n tools/test_docs_tour.sh
          bash -n tools/test_as_built_sync_contract.sh
          bash -n tools/test_test_plan.sh
          bash -n tools/test_repository_development_workflow.sh
          bash -n tools/test_security_invariants.sh
          bash -n tools/test_git_workflow_policy.sh
          bash -n tools/test_git_hooks.sh
          bash -n tools/test_resource_guard.sh
          bash -n tools/test_resource_guard_summary.sh
          bash -n tools/test_resource_cleanup.sh
          bash -n tools/test_git_hooks_parallel.sh
          bash -n tools/test_fixture_copy.sh
          bash -n tools/test_ci_evidence.sh
          bash -n tools/test_ci_timing.sh
          bash -n tools/test_dashboard_schema.sh
          bash -n tools/test_dashboard_data.sh
          bash -n tools/test_dashboard_settings.sh
          bash -n tools/test_dashboard_i18n.sh
          bash -n tools/test_dashboard_control_center.sh
          bash -n tools/product-launch-check
          bash -n tools/test_product_launch_check.sh
          bash -n tools/product-scaffold-check
          bash -n tools/test_product_scaffold_check.sh
          bash -n tools/test_ci_final_gate.sh
          bash -n tools/test_ci_pipeline_acceleration.sh
          bash -n tools/test_lesson_start_position.sh
          bash -n tools/test_lesson.sh
          bash -n tools/test_lesson_context.sh
          bash -n tools/test_lesson14.sh
          bash -n tools/test_menu_prerequisites.sh
          bash -n tools/test_product_gate_tools.sh
          bash -n tools/lib/product_repository_authority.sh
          bash -n tools/lib/product_workflow_git_usage.sh
          bash -n tools/product-repository-authority
          bash -n tools/product-repository-mode
          bash -n tools/product-repository-cleanup
          bash -n tools/test_product_repository_cleanup.sh
          bash -n tools/test_product_repository_authority.sh
          bash -n tools/test_product_repository_mode.sh
          bash -n tools/fixture-copy
          bash -n tools/product-security
          bash -n tools/test_product_security.sh
          bash -n tools/test_product_git_usage_modes.sh
          bash -n tools/test_lesson_repository.sh
          bash -n tools/ci-evidence
          bash -n tools/ci-timing
          bash -n tools/ci-final-gate
          bash -n tools/ci-playwright-setup
          bash -n tools/menu
          bash -n tools/as-built-sync
          bash -n tools/test-plan
          bash -n tools/repository-development-workflow
          bash -n tools/git-workflow
          bash -n tools/git-hooks
          bash -n tools/resource-guard
          bash -n tools/docs-tour
          bash -n tools/dashboard-data
          bash -n tools/dashboard-settings
          bash -n tools/dashboard-control-center
          bash -n tools/free-development
          bash -n tools/team-development
          bash -n tools/external-integration
          bash -n tools/product-improvement
          bash -n tools/lesson
          bash -n tools/lesson-context
          bash -n tools/learn

  structure-docs-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lesson and document structure
        run: |
          ./tools/check_lesson_structure.sh
          ./tools/check_lesson14_sync.sh
          ./tools/check_document_organization.sh
          ./tools/check_learner_display.sh
          ./tools/check_agents_skills.sh
          ./tools/check_as_built_docs.sh
          ./tools/check_as_built_sync_contract.sh
          ./tools/check_test_plan_coverage.sh
          ./tools/check_security_invariants.sh
          ./tools/check_workflow_pair_sync.sh
          ./tools/check_review_protocol.sh
          ./tools/check_developer_memory_requirements.sh
          ./tools/check_repository_development_workflow.sh
          ./tools/check_dashboard_design_system.sh

      - name: Repository boundary
        run: ./tools/check_repository_boundary.sh

      - name: Lesson commands
        run: |
          ./tools/lesson 現在地
          ./tools/lesson 一覧
          ./tools/learn 現在地
          ./tools/lesson-context status

      - name: Regression checks
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          source ./tools/lib/fixture_copy.sh
          fixture_copy_repo . "$work/lesson"

          cd "$work/lesson"
          ./tools/lesson 通過 day1.mode "future step" >/tmp/future.out 2>&1 && exit 1 || true
          ./tools/lesson 通過 setup.index >/tmp/empty-pass.out 2>&1 && exit 1 || true
          ./tools/lesson 学習モード A
          ./tools/lesson 表示言語 ja
          ./tools/lesson 開発言語 ja
          source ./tools/lib/lesson_common.sh
          product_repo="$(lesson_product_repo_root)"
          mkdir -p "$product_repo"
          git -C "$product_repo" init -q
          ./tools/product-profile set --menu 1 --accept-recommended --confirm
          ./tools/lesson 通過 setup.index "設定から体験開発へ進む順番を確認した"
          ./tools/lesson 現在地 | grep './tools/lesson 開始 setup.github-login'
          ./tools/lesson 通過 setup.github-login "github-loginでGitHub接続を確認した"
          ./tools/lesson 現在地 | grep './tools/lesson 開始 day1.mode'
          ./tools/product-repository-cleanup plan | grep 'Nothing is deleted by the plan command.'

          cd "$work/lesson"
          mkdir "$(awk -F '\t' '$1 == "product_repo_name" { print $2 }' lesson/LESSON_CONFIG.tsv)"
          ./tools/check_lesson_structure.sh >/tmp/nested.out 2>&1 && exit 1 || true

  policy-regression-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Policy and workflow regressions
        run: |
          ./tools/test_docs_tour.sh
          ./tools/test_as_built_sync_contract.sh
          ./tools/test_test_plan.sh
          ./tools/test_repository_development_workflow.sh
          ./tools/test_security_invariants.sh
          ./tools/test_git_workflow_policy.sh
          ./tools/test_git_hooks.sh
          ./tools/test_resource_guard.sh
          ./tools/test_resource_guard_summary.sh
          ./tools/test_resource_cleanup.sh
          ./tools/test_git_hooks_parallel.sh
          ./tools/test_fixture_copy.sh
          ./tools/test_lesson_context.sh
          ./tools/test_ci_evidence.sh
          ./tools/test_ci_timing.sh
          ./tools/test_dashboard_schema.sh
          ./tools/test_dashboard_data.sh
          ./tools/test_dashboard_settings.sh
          ./tools/test_dashboard_i18n.sh
          ./tools/test_ci_final_gate.sh
          ./tools/test_ci_pipeline_acceleration.sh
          ./tools/test_menu_prerequisites.sh
          ./tools/test_lesson_start_position.sh
          ./tools/test_lesson14.sh
          ./tools/test_product_launch_check.sh
          ./tools/test_product_scaffold_check.sh
          ./tools/test_product_gate_tools.sh
          ./tools/test_product_repository_cleanup.sh
          ./tools/test_product_repository_authority.sh
          ./tools/test_product_repository_mode.sh
          ./tools/test_product_security.sh
          ./tools/test_product_git_usage_modes.sh
          ./tools/check_ci_workflow_structure.sh

  lesson-cli-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 7-day lesson CLI regression
        run: ./tools/test_lesson.sh

  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Install browser test dependencies
        run: ./tools/ci-playwright-setup

      - name: Lesson Playwright dashboard checks
        env:
          CI_EVIDENCE_DIR: ${{ runner.temp }}/ci-evidence
          CI_EVIDENCE_SOURCE_JOB: playwright-tests
        run: ./tools/test_lesson_playwright.sh --write-evidence

      - name: Dashboard control-center browser checks
        run: ./tools/test_dashboard_control_center.sh

      - name: Upload Playwright evidence
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-evidence-playwright-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-evidence
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  lesson-aggregate:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
      - structure-docs-checks
      - policy-regression-tests
      - lesson-cli-tests
      - playwright-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Download same-run evidence
        uses: actions/download-artifact@v8.0.1
        with:
          name: ci-evidence-playwright-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-evidence

      - name: Install browser test dependencies
        run: ./tools/ci-playwright-setup

      - name: Lesson aggregate test
        env:
          CI_EVIDENCE_DIR: ${{ runner.temp }}/ci-evidence
          CI_EVIDENCE_SOURCE_JOB: lesson-aggregate
          CI_EVIDENCE_PLAYWRIGHT_SOURCE_JOB: playwright-tests
          CI_TIMING_DIR: ${{ runner.temp }}/ci-timing
          CI_TIMING_REPORT: ${{ runner.temp }}/ci-timing/lesson-aggregate.tsv
        run: ./tools/ci-timing run lesson_aggregate --display-name "Lesson aggregate test" --command-id "tools/test_lesson_repository.sh --use-evidence --write-evidence" --mode aggregate --evidence used --inputs AGENTS.MD docs learning lesson skills reviews templates tools .github/workflows package.json package-lock.json playwright.config.js tests -- ./tools/test_lesson_repository.sh --use-evidence --write-evidence

      - name: Upload lesson aggregate timing
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-timing-part-lesson-aggregate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  git-hooks-full-no-cache:
    runs-on: ubuntu-latest
    needs:
      - syntax-checks
      - structure-docs-checks
      - policy-regression-tests
      - lesson-cli-tests
      - playwright-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-ms-playwright-

      - name: Download same-run Playwright evidence
        uses: actions/download-artifact@v8.0.1
        with:
          name: ci-evidence-playwright-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-evidence

      - name: Install browser test dependencies
        run: ./tools/ci-playwright-setup

      - name: Git hooks full no-cache regression
        env:
          RESOURCE_GUARD_SKIP_LOCAL_CHECK: "1"
          CI_EVIDENCE_DIR: ${{ runner.temp }}/ci-evidence
          CI_EVIDENCE_SOURCE_JOB: git-hooks-full-no-cache
          CI_EVIDENCE_PLAYWRIGHT_SOURCE_JOB: playwright-tests
          CI_TIMING_DIR: ${{ runner.temp }}/ci-timing
          CI_TIMING_REPORT: ${{ runner.temp }}/ci-timing/git-hooks-full-no-cache.tsv
        run: ./tools/ci-timing run git_hooks_full_no_cache --display-name "Git hooks full no-cache regression" --command-id "tools/git-hooks run --mode full --no-cache --jobs 4" --mode full-no-cache --evidence recorded --inputs docs/workflow/GIT_HOOK_CHECKS.tsv docs/workflow/GIT_HOOK_PARALLEL_GROUPS.tsv docs/workflow/GIT_HOOKS_POLICY.tsv docs/workflow/FINAL_GATE_COVERAGE.tsv docs/workflow/FINAL_GATE_GAP_COMMANDS.tsv tools .github/workflows -- ./tools/git-hooks run --mode full --no-cache --jobs 4

      - name: Upload Git hook evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-evidence-git-hooks-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-evidence
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Upload Git hooks timing
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-timing-part-git-hooks-full-no-cache-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

  final-gate:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - lesson-aggregate
      - git-hooks-full-no-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify split prerequisites
        env:
          LESSON_AGGREGATE_RESULT: ${{ needs.lesson-aggregate.result }}
          GIT_HOOKS_FULL_NO_CACHE_RESULT: ${{ needs.git-hooks-full-no-cache.result }}
        run: |
          if [[ "$LESSON_AGGREGATE_RESULT" != "success" || "$GIT_HOOKS_FULL_NO_CACHE_RESULT" != "success" ]]; then
            printf 'Split prerequisite failed: lesson-aggregate=%s git-hooks-full-no-cache=%s\n' "$LESSON_AGGREGATE_RESULT" "$GIT_HOOKS_FULL_NO_CACHE_RESULT" >&2
            exit 1
          fi

      - name: Download Git hook evidence
        uses: actions/download-artifact@v8.0.1
        with:
          name: ci-evidence-git-hooks-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-evidence

      - name: Final same-run evidence gate
        env:
          CI_FINAL_GATE_REQUIRE_HOOK_EVIDENCE: "1"
          CI_EVIDENCE_DIR: ${{ runner.temp }}/ci-evidence
          CI_EVIDENCE_EXPECT_SOURCE_JOB: git-hooks-full-no-cache
        run: ./tools/ci-final-gate

      - name: Download CI timing parts
        if: always()
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ci-timing-part-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          merge-multiple: true

      - name: Upload CI timing report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-timing-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timing
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7
